<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Title Blitz</title><style>body{font-family:sans-serif;margin:20px;background-color:#f4f7f6;color:#333;text-align:center}h1{color:#2c3e50}#container{max-width:700px;margin:30px auto;padding:25px;background:#fff;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.08)}input[type=text]{width:calc(100% - 22px);padding:12px;margin-bottom:15px;border:1px solid #ccc;border-radius:5px;font-size:16px}button{background-color:#007bff;color:#fff;padding:12px 20px;border:none;border-radius:5px;cursor:pointer;font-size:16px;transition:background-color .3s ease}button:hover{background-color:#0056b3}#results{margin-top:25px;text-align:left;line-height:1.6}h2{color:#34495e;margin-top:20px}.title-item{background-color:#ecf0f1;padding:15px;margin-bottom:15px;border-radius:5px}p.outline-point{margin-left:15px;font-size:.95em;color:#555}</style></head><body><div id="container"><h1>Title Blitz</h1><p>Instantly generate SEO-optimized blog post titles & outlines.</p><input type="text" id="keywordInput" placeholder="Enter your keyword (e.g., 'sustainable living')"><button onclick="generateContent()">Generate Titles & Outlines</button><div id="results"></div></div><script>async function generateContent(){const keyword=document.getElementById('keywordInput').value;const resultsDiv=document.getElementById('results');resultsDiv.innerHTML='<p>Generating...</p>';if(!keyword){resultsDiv.innerHTML='<p style="color:red;">Please enter a keyword!</p>';return}try{const response=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keyword:keyword})});const data=await response.json();if(response.ok){resultsDiv.innerHTML='';data.forEach(item=>{resultsDiv.innerHTML+=`<div class="title-item"><h2>${item.title}</h2>${item.outline.forEach(point=>{resultsDiv.innerHTML+=`<p class="outline-point">- ${point}</p>`}) || ''}</div>`})}else{resultsDiv.innerHTML=`<p style="color:red;">Error: ${data.message || 'Something went wrong.'}</p>`}}catch(error){resultsDiv.innerHTML=`<p style="color:red;">Network error: ${error.message}</p>`}}</script></body></html>
